<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Мария Хосе — Alyona Kononenko</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,400&family=Epilogue:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --terra:#C4673A;
  --terra-deep:#8B3F1E;
  --terra-pale:#F5E8E0;
  --sage:#8A9A6A;
  --sage-deep:#5A6A3A;
  --sage-pale:#EEF2E6;
  --oatmeal:#F4EDE0;
  --oatmeal-mid:#EAE0CE;
  --paper:#FAF6EE;
  --warm-brown:#6B4F35;
  --deep-brown:#3D2A1A;
  --camel:#C9935A;
  --mist:#8A7060;
  --border:rgba(61,42,26,.10);
  --border-strong:rgba(61,42,26,.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Epilogue',sans-serif;
  background:var(--oatmeal);
  color:var(--deep-brown);
  -webkit-font-smoothing:antialiased;
}
img{max-width:100%;display:block;}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit;}

.site-header{
  position:absolute;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 32px;
}
.brand-mark{
  font-family:'Fraunces',serif;font-style:italic;font-size:19px;color:#fff;
  letter-spacing:.01em;
}
.ig-handle{
  font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.8);
}

.hero{
  position:relative;height:64vh;min-height:420px;
  background-size:cover;background-position:center 30%;
  display:flex;align-items:flex-end;
}
.hero::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(61,42,26,.15) 0%,rgba(61,42,26,.15) 45%,rgba(61,42,26,.86) 100%);
}
.hero-content{position:relative;z-index:2;padding:0 32px 40px;max-width:900px;}
.hero-eyebrow{
  font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  color:var(--camel);margin-bottom:10px;
}
.hero-name{
  font-family:'Fraunces',serif;font-style:italic;font-weight:400;
  font-size:clamp(40px,7vw,76px);line-height:1.02;color:#fff;margin-bottom:14px;
}
.hero-meta{
  display:flex;align-items:center;gap:10px;
  font-size:12px;color:rgba(250,246,238,.7);letter-spacing:.03em;
}
.hero-meta .dot{color:rgba(250,246,238,.4);}

.gallery-wrap{max-width:1400px;margin:0 auto;padding:44px 28px 140px;}
.gallery-grid{column-count:4;column-gap:14px;}
.photo-item{
  position:relative;break-inside:avoid;margin-bottom:14px;
  border-radius:3px;overflow:hidden;cursor:pointer;
  background:var(--oatmeal-mid);
}
.photo-item img{width:100%;transition:transform .5s ease;}
.photo-item:hover img{transform:scale(1.035);}
.pi-heart{
  position:absolute;top:9px;right:9px;width:30px;height:30px;border-radius:50%;
  background:rgba(61,42,26,.42);display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:15px;opacity:0;transition:opacity .2s,background .2s,transform .15s;
  z-index:2;
}
.photo-item:hover .pi-heart{opacity:1;}
.pi-heart.on{opacity:1;background:var(--terra);}
.pi-heart:active{transform:scale(.9);}

.site-footer{
  border-top:.5px solid var(--border);padding:30px 32px 130px;
  display:flex;flex-direction:column;gap:6px;max-width:1400px;margin:0 auto;
}
.site-footer .fname{font-family:'Fraunces',serif;font-style:italic;font-size:16px;color:var(--deep-brown);}
.site-footer .fcontact{font-size:11px;color:var(--mist);letter-spacing:.03em;}

.toolbar{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:4px;z-index:60;
  background:var(--deep-brown);border-radius:44px;padding:8px;
  box-shadow:0 8px 24px rgba(61,42,26,.28);
  max-width:calc(100vw - 24px);
}
.tbtn{
  display:flex;align-items:center;gap:7px;
  padding:10px 18px;border-radius:36px;
  font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:rgba(255,255,255,.68);transition:all .18s;white-space:nowrap;
}
.tbtn:hover{color:#fff;background:rgba(255,255,255,.08);}
.tbtn-primary{background:var(--terra);color:#fff;}
.tbtn-primary:hover{background:var(--terra-deep);color:#fff;}
.tbtn .ic{font-size:14px;line-height:1;}
#favCountWrap{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.5);}

.lightbox{
  position:fixed;inset:0;background:rgba(61,42,26,.97);
  z-index:200;display:none;align-items:center;justify-content:center;
  flex-direction:column;
}
.lightbox.open{display:flex;}
.lb-stage{flex:1;width:100%;display:flex;align-items:center;justify-content:center;padding:70px 70px 0;position:relative;}
.lb-stage img{max-width:100%;max-height:74vh;object-fit:contain;border-radius:2px;user-select:none;}
.lb-close{
  position:absolute;top:18px;right:22px;font-size:26px;color:rgba(255,255,255,.7);
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;z-index:5;
}
.lb-close:hover{color:#fff;background:rgba(255,255,255,.08);}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:46px;height:46px;border-radius:50%;
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.75);
  display:flex;align-items:center;justify-content:center;font-size:22px;z-index:5;
  transition:background .18s,color .18s;
}
.lb-nav:hover{background:var(--terra);color:#fff;}
.lb-prev{left:18px;}
.lb-next{right:18px;}
.lb-counter{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.42);
  padding:14px 0 6px;letter-spacing:.05em;
}
.lb-bar{display:flex;gap:6px;padding-bottom:26px;}
.lb-action{
  display:flex;align-items:center;gap:7px;padding:11px 20px;border-radius:36px;
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.82);
  font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  transition:background .18s;
}
.lb-action:hover{background:rgba(255,255,255,.15);}
.lb-action.on{background:var(--terra);color:#fff;}

.overlay-modal{
  position:fixed;inset:0;background:rgba(61,42,26,.6);z-index:300;
  display:none;align-items:center;justify-content:center;padding:20px;
}
.overlay-modal.open{display:flex;}
.email-card{
  background:var(--paper);border-radius:6px;padding:26px 26px 22px;
  width:100%;max-width:340px;
}
.email-card .et{font-family:'Fraunces',serif;font-size:19px;color:var(--deep-brown);margin-bottom:14px;}
.email-card input{
  width:100%;padding:11px 13px;border-radius:4px;border:.5px solid var(--border-strong);
  background:#fff;font-size:13px;color:var(--deep-brown);margin-bottom:14px;font-family:inherit;
}
.email-card input:focus{outline:none;border-color:var(--terra);}
.email-actions{display:flex;gap:8px;}
.ebtn{
  flex:1;padding:11px;border-radius:4px;font-size:11px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;text-align:center;
}
.ebtn-send{background:var(--terra);color:#fff;}
.ebtn-send:hover{background:var(--terra-deep);}
.ebtn-cancel{background:var(--oatmeal-mid);color:var(--warm-brown);}
.ebtn-cancel:hover{background:var(--border-strong);}

.toast{
  position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--deep-brown);color:var(--paper);font-size:12px;
  padding:12px 22px;border-radius:30px;z-index:400;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:700px){
  .site-header{padding:16px 18px;}
  .brand-mark{font-size:16px;}
  .ig-handle{display:none;}
  .hero{height:46vh;min-height:320px;}
  .hero-content{padding:0 18px 26px;}
  .gallery-wrap{padding:26px 12px 130px;}
  .gallery-grid{column-count:2;column-gap:8px;}
  .photo-item{margin-bottom:8px;border-radius:2px;}
  .pi-heart{opacity:.9;width:26px;height:26px;font-size:13px;top:6px;right:6px;}
  .site-footer{padding:22px 18px 120px;}
  .toolbar{bottom:12px;padding:6px;gap:2px;}
  .tbtn{padding:9px 12px;font-size:9.5px;gap:5px;}
  .tbtn span.txt{display:none;}
  .lb-stage{padding:60px 14px 0;}
  .lb-nav{width:38px;height:38px;font-size:18px;}
  .lb-prev{left:6px;}
  .lb-next{right:6px;}
  .lb-action{padding:10px 13px;}
  .lb-action span.txt{display:none;}
  .lb-bar{padding-bottom:20px;}
}
@media(min-width:701px) and (max-width:1024px){
  .gallery-grid{column-count:3;}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="brand-mark">Alyona Kononenko</div>
  <div class="ig-handle">@alyona_kononenko_</div>
</header>

<section class="hero" id="heroSection">
  <div class="hero-content">
    <div class="hero-eyebrow">Фотосессия · Малага</div>
    <h1 class="hero-name">Мария Хосе</h1>
    <div class="hero-meta">
      <span>10 июля 2026</span>
      <span class="dot">·</span>
      <span id="photoCountLabel">24 фото</span>
    </div>
  </div>
</section>

<main class="gallery-wrap">
  <div class="gallery-grid" id="galleryGrid"></div>
</main>

<footer class="site-footer">
  <div class="fname">Alyona Kononenko</div>
  <div class="fcontact">Málaga · Marbella · +380 99 337 7335 · @alyona_kononenko_</div>
</footer>

<nav class="toolbar">
  <button class="tbtn tbtn-primary" id="downloadAllBtn"><span class="ic">↓</span><span class="txt">Скачать всё</span></button>
  <button class="tbtn" id="shareBtn"><span class="ic">⤴</span><span class="txt">Поделиться</span></button>
  <button class="tbtn" id="favToolbarBtn"><span class="ic">♡</span><span class="txt">Избранное</span><span id="favCountWrap">0</span></button>
</nav>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">×</button>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <button class="lb-nav lb-next" id="lbNext">›</button>
  <div class="lb-stage">
    <img id="lbImage" src="" alt="">
  </div>
  <div class="lb-counter" id="lbCounter">1 / 24</div>
  <div class="lb-bar">
    <button class="lb-action" id="lbFav"><span class="ic">♡</span><span class="txt">В избранное</span></button>
    <button class="lb-action" id="lbDownload"><span class="ic">↓</span><span class="txt">Скачать</span></button>
    <button class="lb-action" id="lbEmail"><span class="ic">✉</span><span class="txt">На почту</span></button>
  </div>
</div>

<div class="overlay-modal" id="emailModal">
  <div class="email-card">
    <div class="et">Отправить фото на почту</div>
    <input type="email" id="emailInput" placeholder="ваш@email.com">
    <div class="email-actions">
      <button class="ebtn ebtn-cancel" id="emailCancel">Отмена</button>
      <button class="ebtn ebtn-send" id="emailSend">Отправить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const dims = [
  [800,1050],[800,1250],[900,720],[800,1000],
  [800,1300],[900,760],[800,1100],[800,950],
  [900,700],[800,1200],[800,1000],[900,780]
];
const photos = [];
for(let i=1;i<=24;i++){
  const d = dims[(i-1)%dims.length];
  photos.push({
    id:i,
    src:`https://picsum.photos/seed/alyona-mj-${i}/${d[0]}/${d[1]}`,
    w:d[0],h:d[1]
  });
}

const favorites = new Set();
let currentIndex = 0;

const grid = document.getElementById('galleryGrid');
photos.forEach((p,idx)=>{
  const item = document.createElement('div');
  item.className = 'photo-item';
  item.innerHTML = `<img src="${p.src}" loading="lazy" alt="Фото ${p.id}"><button class="pi-heart" data-id="${p.id}">♡</button>`;
  item.querySelector('img').addEventListener('click', ()=>openLightbox(idx));
  const heart = item.querySelector('.pi-heart');
  heart.addEventListener('click',(e)=>{
    e.stopPropagation();
    toggleFavorite(p.id);
  });
  grid.appendChild(item);
});
document.getElementById('photoCountLabel').textContent = photos.length + ' фото';

const heroImg = photos[0];
document.getElementById('heroSection').style.backgroundImage = `url(${heroImg.src.replace(`/${heroImg.w}/${heroImg.h}`,'/1600/1000')})`;

function updateFavUI(){
  document.getElementById('favCountWrap').textContent = favorites.size;
  document.querySelectorAll('.pi-heart').forEach(h=>{
    const id = Number(h.dataset.id);
    const on = favorites.has(id);
    h.classList.toggle('on', on);
    h.textContent = on ? '♥' : '♡';
  });
  const lbFav = document.getElementById('lbFav');
  if(lightbox.classList.contains('open')){
    const on = favorites.has(photos[currentIndex].id);
    lbFav.classList.toggle('on', on);
    lbFav.querySelector('.ic').textContent = on ? '♥' : '♡';
  }
}
function toggleFavorite(id){
  if(favorites.has(id)){ favorites.delete(id); } else { favorites.add(id); showToast('Добавлено в избранное'); }
  updateFavUI();
}

const lightbox = document.getElementById('lightbox');
const lbImage = document.getElementById('lbImage');
const lbCounter = document.getElementById('lbCounter');

function openLightbox(idx){
  currentIndex = idx;
  renderLightbox();
  lightbox.classList.add('open');
}
function renderLightbox(){
  const p = photos[currentIndex];
  lbImage.src = p.src;
  lbCounter.textContent = `${currentIndex+1} / ${photos.length}`;
  updateFavUI();
}
function closeLightbox(){ lightbox.classList.remove('open'); }
function nextPhoto(){ currentIndex = (currentIndex+1) % photos.length; renderLightbox(); }
function prevPhoto(){ currentIndex = (currentIndex-1+photos.length) % photos.length; renderLightbox(); }

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbNext').addEventListener('click', nextPhoto);
document.getElementById('lbPrev').addEventListener('click', prevPhoto);
document.getElementById('lbFav').addEventListener('click', ()=>toggleFavorite(photos[currentIndex].id));
document.getElementById('lbDownload').addEventListener('click', ()=>{
  const a = document.createElement('a');
  a.href = photos[currentIndex].src;
  a.download = `alyona-kononenko-${photos[currentIndex].id}.jpg`;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  a.remove();
  showToast('Скачивание начато');
});

lightbox.addEventListener('click', (e)=>{ if(e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown',(e)=>{
  if(!lightbox.classList.contains('open')) return;
  if(e.key==='Escape') closeLightbox();
  if(e.key==='ArrowRight') nextPhoto();
  if(e.key==='ArrowLeft') prevPhoto();
});

let touchStartX = 0;
document.querySelector('.lb-stage').addEventListener('touchstart',(e)=>{ touchStartX = e.touches[0].clientX; });
document.querySelector('.lb-stage').addEventListener('touchend',(e)=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 50){ dx < 0 ? nextPhoto() : prevPhoto(); }
});

document.getElementById('downloadAllBtn').addEventListener('click', ()=>{
  showToast('Собираем ZIP-архив со всеми фото…');
});
document.getElementById('shareBtn').addEventListener('click', ()=>{
  if(navigator.share){
    navigator.share({title:'Мария Хосе — Alyona Kononenko', url:location.href}).catch(()=>{});
  } else {
    showToast('Ссылка на галерею скопирована');
  }
});
document.getElementById('favToolbarBtn').addEventListener('click', ()=>{
  showToast(favorites.size ? `В избранном: ${favorites.size}` : 'Пока нет избранных фото');
});

const emailModal = document.getElementById('emailModal');
document.getElementById('lbEmail').addEventListener('click', ()=>{ emailModal.classList.add('open'); });
document.getElementById('emailCancel').addEventListener('click', ()=>{ emailModal.classList.remove('open'); });
document.getElementById('emailSend').addEventListener('click', ()=>{
  const val = document.getElementById('emailInput').value.trim();
  if(!val){ showToast('Введите адрес почты'); return; }
  emailModal.classList.remove('open');
  document.getElementById('emailInput').value = '';
  showToast(`Фото отправлено на ${val}`);
});

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}
</script>
</body>
</html>
